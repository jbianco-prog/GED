<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/ged/public

    # Logs
    ErrorLog  ${APACHE_LOG_DIR}/ged_error.log
    CustomLog ${APACHE_LOG_DIR}/ged_access.log combined

    <Directory /var/www/ged/public>
        Options -Indexes -ExecCGI
        AllowOverride All
        Require all granted
    </Directory>

    # Bloquer l'accès au reste du projet
    <Directory /var/www/ged>
        Require all denied
    </Directory>
    <Directory /var/www/ged/public>
        Require all granted
    </Directory>

    # Bloquer l'accès direct au stockage
    <Directory /var/www/ged/storage>
        Require all denied
    </Directory>

    # Headers de sécurité
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</VirtualHost>
