; /usr/local/etc/php/conf.d/ged.ini — Configuration PHP pour la GED

; Upload
upload_max_filesize = 50M
post_max_size       = 55M
max_file_uploads    = 20

; Exécution
max_execution_time  = 120
max_input_time      = 120
memory_limit        = 256M

; Sécurité
expose_php          = Off
display_errors      = Off
log_errors          = On
error_log           = /var/log/apache2/php_errors.log

; Session
session.cookie_httponly = 1
session.cookie_samesite = Strict
session.use_strict_mode = 1

; Encodage
default_charset     = UTF-8
